<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pgLang</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #d4d4d1;
      --text: #1c1c1c;
      --muted: #999;
      --line: rgba(0,0,0,0.1);
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Times New Roman', Times, serif;
      font-size: 14px;
      min-height: 100vh;
    }

    nav {
      padding: 18px 28px;
    }

    .nav-logo {
      font-family: 'Times New Roman', Times, serif;
      font-size: 13.5px;
      color: var(--text);
      text-decoration: none;
      font-weight: 400;
    }

    main {
      padding: 28px 0 80px;
    }

    .entry {
      cursor: pointer;
    }

    .entry-header {
      display: grid;
      grid-template-columns: 110px 1fr;
      padding: 5px 28px;
    }

    .entry-date {
      font-family: 'Times New Roman', Times, serif;
      font-size: 13px;
      color: var(--muted);
      padding-top: 1px;
      font-weight: 400;
    }

    .entry-title {
      font-family: 'Times New Roman', Times, serif;
      font-size: 14px;
      font-weight: 400;
      color: var(--text);
      line-height: 1.5;
    }

    /* EXPANDED */
    .entry-body {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.32s ease;
    }

    .entry.open .entry-body {
      grid-template-rows: 1fr;
    }

    .entry-body-inner {
      overflow: hidden;
    }

    .entry-content {
      display: grid;
      grid-template-columns: 110px 1fr;
      padding: 4px 28px 22px;
    }

    .entry-content-date {
      font-family: 'Times New Roman', Times, serif;
      font-size: 12.5px;
      color: var(--muted);
      padding-top: 1px;
    }

    .entry-content-body {
      font-family: 'Times New Roman', Times, serif;
      font-size: 13.5px;
      line-height: 1.72;
      color: var(--text);
      max-width: 520px;
    }

    .entry-content-body p + p {
      margin-top: 10px;
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="#">pgLang</a>
</nav>

<main id="timeline"></main>

  {

  },
  {

  },
  {

const timeline = document.getElementById('timeline');

entries.forEach(entry => {
  const el = document.createElement('div');
  el.className = 'entry';
  el.innerHTML = `
    <div class="entry-header">
      <span class="entry-date">${entry.date}</span>
      <span class="entry-title">${entry.title.replace(/\n/g, '<br>')}</span>
    </div>
    <div class="entry-body">
      <div class="entry-body-inner">
        <div class="entry-content">
          <span class="entry-content-date">${entry.date}</span>
          <div class="entry-content-body"><p>${entry.body}</p></div>
        </div>
      </div>
    </div>
  `;

  el.querySelector('.entry-header').addEventListener('click', () => {
    const isOpen = el.classList.contains('open');
    document.querySelectorAll('.entry.open').forEach(e => e.classList.remove('open'));
    if (!isOpen) el.classList.add('open');
  });

  timeline.appendChild(el);
});
</script>
</body>
</html>
